<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/account-overlay.css" />
    <link rel="stylesheet" href="./styles/addtask-form-elements.css" />
    <link rel="stylesheet" href="./styles/addtask.css" />
    <link rel="stylesheet" href="./styles/mobile/style-mobile.css" />
    <link rel="stylesheet" href="./styles/mobile/addtask-mobile.css" />
    <link rel="stylesheet" href="./styles/mobile/account-overlay-mobile.css" />
    <title>Join - Add Task</title>
  </head>
  <body onload="initAddTask()">
    <nav class="sidebar" aria-label="Hauptnavigation">
      <img src="./assets/main-page/join-logo-white.svg" alt="Join Logo" />
      <div class="nav-links">
        <a href="summaryuser.html">
          <img src="./assets/summary-page/summary-icon.svg" alt="" />
          Summary
        </a>
        <a href="addtask.html" class="active">
          <img src="./assets/summary-page/add-task-icon.svg" alt="" />
          Add Task
        </a>
        <a href="board.html">
          <img src="./assets/summary-page/board-icon.svg" alt="" />
          Board
        </a>
        <a href="contacts.html">
          <img src="./assets/summary-page/contacts-icon.svg" alt="" />
          Contacts
        </a>
      </div>
      <div class="legal-links">
        <a href="privacypolicy.html">Privacy Policy</a>
        <a href="legalnotice.html">Legal notice</a>
      </div>
    </nav>

    <main class="main-content" aria-label="Hauptinhalt">
      <header class="dashboard-header" aria-label="Dashboard Kopfzeile">
        <div class="header-content" aria-label="Kopfzeileninhalt">
          <span>Kanban Project Management Tool</span>
          <div class="header-icons" aria-label="Kopfzeilensymbole">
            <a href="help.html" class="help-link">
              <img src="./assets/summary-page/help.svg" alt="Help" />
            </a>
            <div class="user-menu-container" aria-label="Benutzermenü Container">
              <div
                class="user-initials"
                id="user-initials"
                onclick="toggleUserMenu()"
                role="button"
                tabindex="0"
                aria-haspopup="true"
                aria-expanded="false"
              ></div>
              <nav
                class="user-dropdown"
                id="user-dropdown"
                aria-label="User menu"
              >
                <a href="#" onclick="openAccountOverlay(); return false;">Account</a>
                <a href="legalnotice.html">Legal Notice</a>
                <a href="privacypolicy.html">Privacy Policy</a>
                <a
                  href="#"
                  onclick="
                    handleLogout();
                    return false;
                  "
                  >Log out</a
                >
              </nav>
            </div>
          </div>
        </div>
      </header>

      <section class="add-task-section">
        <h1>Add Task</h1>

        <form id="add-task-form" onsubmit="handleAddTask(event)" aria-label="Neue Aufgabe erstellen">
          <div class="form-container" aria-label="Formularbereich">
            <div class="form-column" aria-label="Formularspalte">
              <div class="form-group" aria-label="Formulargruppe">
                <label for="title">Title<span class="required">*</span></label>
                <input
                  type="text"
                  id="title"
                  placeholder="Enter a title"
                  oninput="validateForm()"
                  required
                />
              </div>

              <div class="form-group" aria-label="Formulargruppe">
                <label for="description">Description</label>
                <textarea
                  id="description"
                  placeholder="Enter a Description"
                  rows="5"
                  oninput="validateForm()"
                ></textarea>
              </div>

              <div class="form-group" aria-label="Formulargruppe">
                <label for="due-date"
                  >Due date<span class="required">*</span></label
                >
                <input
                  type="text"
                  id="due-date"
                  placeholder="tt.mm.jjjj"
                  oninput="validateForm()"
                  onfocus="this.type='date'; this.showPicker ? this.showPicker() : null"
                  onblur="if(!this.value) this.type='text'"
                  required
                />
                <img src="./assets/icons/addtask-date-icon.svg" class="date-icon" alt="Date">
              </div>

              <div class="form-group" aria-label="Formulargruppe">
                <label>Priority</label>
                <div class="priority-buttons" aria-label="Priorität Schaltflächen">
                  <button
                    type="button"
                    class="priority-btn"
                    data-priority="urgent"
                    onclick="selectPriority('urgent')"
                  >
                    Urgent
                    <img
                      src="./assets/icons/urgent-iconAddTask.png"
                      alt="Urgent"
                    />
                  </button>
                  <button
                    type="button"
                    class="priority-btn active"
                    data-priority="medium"
                    onclick="selectPriority('medium')"
                  >
                    Medium
                    <img
                      src="./assets/icons/medium-iconAddTask.png"
                      alt="Medium"
                    />
                  </button>
                  <button
                    type="button"
                    class="priority-btn"
                    data-priority="low"
                    onclick="selectPriority('low')"
                  >
                    Low
                    <img src="./assets/icons/low-iconAddTask.png" alt="Low" />
                  </button>
                </div>
              </div>

              <div class="form-group" aria-label="Formulargruppe">
                <label for="category"
                  >Category<span class="required">*</span></label
                >
                <select id="category" onclick="this.parentElement.classList.toggle('open')" onblur="this.parentElement.classList.remove('open')" onchange="this.parentElement.classList.remove('open')" oninput="validateForm()" required>
                  <option value="">Select task category</option>
                  <option value="technical">Technical Task</option>
                  <option value="user-story">User Story</option>
                </select>
                <img src="./assets/icons/arrow-dropdown.svg" class="select-arrow-icon" alt="Arrow">
              </div>
            </div>

            <div class="form-column" aria-label="Formularspalte">
              <div class="form-group attachments-group">
                <label>Attachments</label>
                <div class="attachments-header">
                  <span class="attachments-subtext">Allowed file types are JPEG and PNG</span>
                  <button type="button" class="btn-delete-all d-none" id="delete-all-attachments" onclick="clearAllAttachments()">
                    <img src="./assets/icons/delete.svg" alt="Delete" /> Delete all
                  </button>
                </div>
                <div class="upload-area" id="upload-area" onclick="document.getElementById('file-upload').click()" role="button" tabindex="0" aria-label="Datei hochladen">
                  <span class="upload-text">
                    <span class="upload-text-desktop">Drag a file or browse </span>
                    <span class="upload-text-mobile d-none">Upload file </span>
                    <img src="./assets/icons/add-gray.svg" alt="+" class="upload-plus-icon"/>
                  </span>
                  <input type="file" id="file-upload" multiple accept="image/jpeg, image/png" class="d-none" onchange="handleFileSelect(event)">
                </div>
                <div class="upload-preview" id="upload-preview">
                  <!-- Thumbnails will be rendered here -->
                </div>
              </div>

              <div class="form-group" aria-label="Formulargruppe">
                <label>Subtasks</label>
                <div
                  class="subtask-input-wrapper"
                  id="subtask-wrapper"
                  onclick="document.getElementById('subtask-input').focus()"
                >
                  <input
                    type="text"
                    id="subtask-input"
                    placeholder="Add new subtask"
                    onfocus="showSubtaskIcons()"
                    onkeydown="handleSubtaskKeydown(event)"
                  />
                  <div
                    class="subtask-icons-active v-hidden"
                    id="subtask-icons-active"
                  >
                    <img
                      src="./assets/icons/clear-X-icon.svg"
                      alt="Clear"
                      onclick="clearSubtaskInput()"
                      class="subtask-icon"
                      role="button"
                      tabindex="0"
                      aria-label="Subtask-Eingabe leeren"
                    />
                    <div class="subtask-divider"></div>
                    <img
                      src="./assets/icons/check-create-icon-black.svg"
                      alt="Save"
                      onclick="addSubtask()"
                      class="subtask-icon"
                      role="button"
                      tabindex="0"
                      aria-label="Subtask speichern"
                    />
                  </div>
                </div>
                <ul id="subtask-list" class="subtask-list"></ul>
              </div>

              <div class="form-group" aria-label="Formulargruppe">
                <label>Assigned to</label>
                <div class="custom-select-wrapper" id="assigned-to-wrapper">
                  <div
                    class="custom-select-header"
                    onclick="toggleAssignedToDropdown()"
                    role="button"
                    tabindex="0"
                    aria-expanded="false"
                    aria-label="Kontakte zuweisen"
                  >
                    <span id="selected-contact-text"
                      >Select contacts to assign</span
                    >
                    <img src="./assets/icons/arrow-dropdown.svg" class="dropdown-arrow-icon" alt="Arrow">
                  </div>
                  <div
                    class="custom-select-options d-none"
                    id="assigned-to-options"
                  >
                    <!-- Contacts will be rendered here -->
                  </div>
                </div>
                <div
                  id="selected-contacts-initials"
                  class="selected-contacts-initials"
                >
                  <!-- Selected contact avatars will be rendered here -->
                </div>
              </div>
            </div>
          </div>

          <div class="form-footer" aria-label="Formular Fußbereich">
            <p class="required-note">
              <span class="required">*</span>This field is required
            </p>
            <div class="form-actions" aria-label="Formular Aktionen">
              <button type="button" class="btn-clear" onclick="clearForm()">
                Clear
                <img src="./assets/icons/clear-X-icon.svg" alt="Clear" />
              </button>
              <button
                type="submit"
                id="create-task-btn"
                class="btn-create"
                disabled
              >
                Create Task
                <img
                  src="./assets/icons/check-create-icon.svg"
                  alt="Create Task"
                />
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./scripts/firebase-init.js"></script>
    <script src="./scripts/auth-defaults.js"></script>
    <script src="./scripts/auth.js"></script>
    <script src="./scripts/user-initials.js"></script>
    <script src="./script.js"></script>
    <script src="./scripts/side-menu.js"></script>
    <script src="./scripts/user-menu.js"></script>
    <script src="./scripts/templates/account-overlay-template.js"></script>
    <script src="./scripts/account-validation.js"></script>
    <script src="./scripts/account-overlay.js"></script>
    <script src="./scripts/templates/file-upload-template.js"></script>
    <script src="./scripts/file-upload-utils.js"></script>
    <script src="./scripts/file-upload.js"></script>
    <script src="./scripts/templates/addtask-template.js"></script>
    <script src="./scripts/addtask-utils.js"></script>
    <script src="./scripts/addtask-contacts.js"></script>
    <script src="./scripts/addtask-subtasks.js"></script>
    <script src="./scripts/attachments-drag-scroll.js"></script>
    <script src="./scripts/addtask-attachments.js"></script>
    <script src="./scripts/addtask.js"></script>
    <script src="./scripts/wcag-accessibility.js"></script>
  </body>
</html>
