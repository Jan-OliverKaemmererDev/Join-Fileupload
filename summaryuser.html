<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/account-overlay.css" />
    <link rel="stylesheet" href="./styles/summary.css" />
    <link rel="stylesheet" href="./styles/mobile/style-mobile.css" />
    <link rel="stylesheet" href="./styles/mobile/summary-mobile.css" />
    <link rel="stylesheet" href="./styles/mobile/account-overlay-mobile.css" />
    <title>Join - Summary</title>
  </head>
  <body onload="initSummaryUser()">
    <nav class="sidebar" aria-label="Hauptnavigation">
      <img src="./assets/main-page/join-logo-white.svg" alt="Join Logo" />
      <div class="nav-links">
        <a href="summaryuser.html" class="active">
          <img src="./assets/summary-page/summary-icon.svg" alt="" />
          Summary
        </a>
        <a href="addtask.html">
          <img src="./assets/summary-page/add-task-icon.svg" alt="" />
          Add Task
        </a>
        <a href="board.html">
          <img src="./assets/summary-page/board-icon.svg" alt="" />
          Board
        </a>
        <a href="contacts.html">
          <img src="./assets/summary-page/contacts-icon.svg" alt="" />
          Contacts
        </a>
      </div>
      <div class="legal-links">
        <a href="privacypolicy.html">Privacy Policy</a>
        <a href="legalnotice.html">Legal notice</a>
      </div>
    </nav>

    <main class="main-content" aria-label="Hauptinhalt">
      <header class="dashboard-header" aria-label="Dashboard Kopfzeile">
        <div class="header-content" aria-label="Kopfzeileninhalt">
          <span>Kanban Project Management Tool</span>
          <div class="header-icons" aria-label="Kopfzeilensymbole">
            <a href="help.html" class="help-link">
              <img src="./assets/summary-page/help.svg" alt="Help" />
            </a>
            <div class="user-menu-container" aria-label="Benutzermenü Container">
              <div
                class="user-initials"
                id="user-initials"
                onclick="toggleUserMenu()"
                role="button"
                tabindex="0"
                aria-haspopup="true"
                aria-expanded="false"
              ></div>
              <nav
                class="user-dropdown"
                id="user-dropdown"
                aria-label="User menu"
              >
                <a
                  href="#"
                  onclick="
                    openAccountOverlay();
                    return false;
                  "
                  >Account</a
                >
                <a href="legalnotice.html">Legal Notice</a>
                <a href="privacypolicy.html">Privacy Policy</a>
                <a
                  href="#"
                  onclick="
                    handleLogout();
                    return false;
                  "
                  >Log out</a
                >
              </nav>
            </div>
          </div>
        </div>
      </header>

      <section class="summary-section">
        <div class="summary-title">
          <h1>Join 360</h1>
          <div class="vertical-line"></div>
          <span>Key Metrics at a Glance</span>
        </div>

        <div class="summary-container" aria-label="Summary Bereich">
          <div class="metrics-grid">
            <div
              class="metric-card card-small"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="To-do Aufgaben anzeigen"
            >
              <div class="icon-badge">
                <img
                  src="./assets/summary-page/edit-icon-summary.svg"
                  alt="To-do icon"
                />
              </div>
              <div>
                <b id="count-todo"></b>
                <p>To-do</p>
              </div>
            </div>
            <div
              class="metric-card card-small"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="Erledigte Aufgaben anzeigen"
            >
              <div class="icon-badge">
                <img
                  src="./assets/summary-page/check-icon-summary.svg"
                  alt="Done icon"
                />
              </div>
              <div>
                <b id="count-done"></b>
                <p>Done</p>
              </div>
            </div>
            <div
              class="metric-card card-large"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="Dringende Aufgaben anzeigen"
            >
              <div class="urgent-info">
                <div class="icon-badge">
                  <img
                    src="./assets/summary-page/urgent-icon-summary.svg"
                    alt="Urgent icon"
                  />
                </div>
                <div>
                  <b id="count-urgent"></b>
                  <p>Urgent</p>
                </div>
              </div>
              <div class="deadline-info">
                <b id="next-deadline"></b>
                <p>Upcoming Deadline</p>
              </div>
            </div>
            <div
              class="metric-card card-square"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="E-Mail-Anfragen anzeigen"
            >
              <b id="count-emails">0</b>
              <p>Email<br />requests</p>
            </div>
            <div
              class="metric-card card-square"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="Aufgaben im Board anzeigen"
            >
              <b id="count-board"></b>
              <p>Tasks in<br />Board</p>
            </div>
            <div
              class="metric-card card-square"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="Aufgaben in Bearbeitung anzeigen"
            >
              <b id="count-progress"></b>
              <p>Tasks In Progress</p>
            </div>
            <div
              class="metric-card card-square"
              onclick="redirectToBoard(event)"
              role="button"
              tabindex="0"
              aria-label="Aufgaben mit Feedback-Wartezeit anzeigen"
            >
              <b id="count-awaiting"></b>
              <p>Awaiting Feedback</p>
            </div>
          </div>

          <div class="greeting-container">
            <h2 id="greeting-text">Good morning,</h2>
            <h1 id="user-name"></h1>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./scripts/firebase-init.js"></script>
    <script src="./scripts/auth-defaults.js"></script>
    <script src="./scripts/auth.js"></script>
    <script src="./scripts/user-initials.js"></script>
    <script src="./script.js"></script>
    <script src="./scripts/side-menu.js"></script>
    <script src="./scripts/user-menu.js"></script>
    <script src="./scripts/templates/account-overlay-template.js"></script>
    <script src="./scripts/account-validation.js"></script>
    <script src="./scripts/account-overlay.js"></script>
    <script src="./scripts/templates/file-upload-template.js"></script>
    <script src="./scripts/file-upload-utils.js"></script>
    <script src="./scripts/file-upload.js"></script>
    <script src="./scripts/summaryuser.js"></script>
    <script src="./scripts/wcag-accessibility.js"></script>
  </body>
</html>
